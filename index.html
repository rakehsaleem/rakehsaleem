<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muhammad Rakeh Saleem, PhD</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, nodes;

const NAME = "Muhammad Rakeh Saleem, PhD";
const SUBTITLE = "AI Researcher  ·  Computer Vision  ·  Document Intelligence";
const NODE_COUNT = 70;
const MAX_DIST = 130;
let mouse = null;

function init() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  nodes = Array.from({ length: NODE_COUNT }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.7,
    vy: (Math.random() - 0.5) * 0.7,
    r: Math.random() * 2.5 + 1.5
  }));
}

canvas.addEventListener('mousemove', e => { mouse = { x: e.clientX, y: e.clientY }; });
canvas.addEventListener('mouseleave', () => { mouse = null; });
window.addEventListener('resize', init);

function draw() {
  ctx.clearRect(0, 0, W, H);

  for (let i = 0; i < NODE_COUNT; i++) {
    const a = nodes[i];
    for (let j = i + 1; j < NODE_COUNT; j++) {
      const b = nodes[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < MAX_DIST) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(100,160,255,${(1 - d / MAX_DIST) * 0.4})`;
        ctx.lineWidth = 0.8;
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
    if (mouse) {
      const dx = a.x - mouse.x, dy = a.y - mouse.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 160) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(120,200,255,${(1 - d / 160) * 0.7})`;
        ctx.lineWidth = 1;
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(mouse.x, mouse.y);
        ctx.stroke();
      }
    }
  }

  for (const n of nodes) {
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(100,160,255,0.85)';
    ctx.fill();
    n.x += n.vx; n.y += n.vy;
    if (n.x < 0 || n.x > W) n.vx *= -1;
    if (n.y < 0 || n.y > H) n.vy *= -1;
  }

  const cx = W / 2, cy = H / 2;
  ctx.fillStyle = 'rgba(255,255,255,0.93)';
  ctx.font = '500 36px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(NAME, cx, cy - 10);

  ctx.fillStyle = 'rgba(140,180,255,0.8)';
  ctx.font = '400 16px system-ui, sans-serif';
  ctx.fillText(SUBTITLE, cx, cy + 22);

  requestAnimationFrame(draw);
}

init();
draw();
</script>
</body>
</html>
