<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muhammad Rakeh Saleem, PhD</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; overflow: hidden; font-family: system-ui, sans-serif; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, nodes;

const LINE1 = "Muhammad Rakeh Saleem, PhD";
const LINE2 = "Senior Data Scientist  ·  AI Architect  ·  Computer Vision";
const LINE3 = "GA Telesis  ·  Predictive Logistics  ·  SHM";
const NODE_COUNT = 75;
const MAX_DIST = 130;
let mouse = null;

function init() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  nodes = Array.from({ length: NODE_COUNT }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.65,
    vy: (Math.random() - 0.5) * 0.65,
    r:  Math.random() * 2.5 + 1.5
  }));
}

canvas.addEventListener('mousemove', e => { mouse = { x: e.clientX, y: e.clientY }; });
canvas.addEventListener('mouseleave', () => { mouse = null; });
window.addEventListener('resize', init);

function draw() {
  ctx.clearRect(0, 0, W, H);

  for (let i = 0; i < nodes.length; i++) {
    const a = nodes[i];
    for (let j = i + 1; j < nodes.length; j++) {
      const b = nodes[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < MAX_DIST) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(55,138,221,${(1 - d / MAX_DIST) * 0.4})`;
        ctx.lineWidth = 0.8;
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
    if (mouse) {
      const dx = a.x - mouse.x, dy = a.y - mouse.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 170) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(100,180,255,${(1 - d / 170) * 0.75})`;
        ctx.lineWidth = 1;
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(mouse.x, mouse.y);
        ctx.stroke();
      }
    }
  }

  for (const n of nodes) {
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(55,138,221,0.85)';
    ctx.fill();
    n.x += n.vx; n.y += n.vy;
    if (n.x < 0 || n.x > W) n.vx *= -1;
    if (n.y < 0 || n.y > H) n.vy *= -1;
  }

  const cx = W / 2, cy = H / 2;

  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.94)';
  ctx.font = '600 38px system-ui, sans-serif';
  ctx.fillText(LINE1, cx, cy - 22);

  ctx.fillStyle = 'rgba(55,138,221,0.9)';
  ctx.font = '400 16px system-ui, sans-serif';
  ctx.fillText(LINE2, cx, cy + 14);

  ctx.fillStyle = 'rgba(140,180,220,0.65)';
  ctx.font = '400 13px system-ui, sans-serif';
  ctx.fillText(LINE3, cx, cy + 38);

  requestAnimationFrame(draw);
}

init();
draw();
</script>
</body>
</html>
